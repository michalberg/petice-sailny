  <line x1="201" y1="72" x2="201" y2="138" stroke="#0fa040" stroke-width="2"/>

  <!-- articulation 1 -->
  <rect x="224" y="76" width="20" height="58" rx="2" fill="rgba(255,255,255,0.3)"/>

