  <rect x="252" y="82" width="32" height="28" rx="2" fill="#1ACA5A"/>
  <rect x="292" y="82" width="32" height="28" rx="2" fill="#1ACA5A"/>

  <!-- door 2 -->
  <rect x="332" y="72" width="34" height="66" rx="2" fill="#17b34e"/>
  <line x1="349" y1="72" x2="349" y2="138" stroke="#0fa040" stroke-width="2"/>

