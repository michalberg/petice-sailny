  <circle cx="540" cy="158" r="12" fill="#0a5c25"/><circle cx="540" cy="158" r="7" fill="#0e7a31"/>
  <circle cx="582" cy="158" r="12" fill="#0a5c25"/><circle cx="582" cy="158" r="7" fill="#0e7a31"/>

  <!-- rails -->
  <rect x="0" y="168" width="640" height="3" rx="1" fill="rgba(0,0,0,0.15)"/>
  <rect x="0" y="173" width="640" height="3" rx="1" fill="rgba(0,0,0,0.15)"/>
