  <!-- pantograph -->
  <line x1="522" y1="22" x2="512" y2="40" stroke="rgba(0,0,0,0.3)" stroke-width="1.5"/>
  <line x1="512" y1="40" x2="504" y2="58" stroke="rgba(0,0,0,0.3)" stroke-width="1.5"/>
  <line x1="504" y1="58" x2="516" y2="70" stroke="rgba(0,0,0,0.25)" stroke-width="1"/>
  <rect x="510" y="20" width="24" height="4" rx="2" fill="rgba(0,0,0,0.3)"/>

  <!-- body -->
  <path d="M24,138 L24,88 Q24,74 36,74 L58,74 L58,138 Z" fill="white" opacity="0.92"/>
  <rect x="36" y="72" width="568" height="66" rx="4" fill="white" opacity="0.92"/>
  <path d="M616,138 L616,88 Q616,74 604,74 L582,74 L582,138 Z" fill="white" opacity="0.92"/>
  <rect x="36" y="72" width="568" height="9" rx="3" fill="white" opacity="0.6"/>

