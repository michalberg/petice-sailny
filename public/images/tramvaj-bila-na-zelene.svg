  <circle cx="224" cy="158" r="12" fill="#0a5c25"/><circle cx="224" cy="158" r="7" fill="#0e7a31"/>
  <circle cx="266" cy="158" r="12" fill="#0a5c25"/><circle cx="266" cy="158" r="7" fill="#0e7a31"/>

