name: Aktualizovat počet podpisů

on:
  schedule:
    - cron: "0 5,8,11,14,17,20 * * *"  # 7,10,13,16,19,22 CZ (UTC+2)
  workflow_dispatch:          # ruční spuštění

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Stáhnout data z Action Network
        env:
          AN_API_KEY: ${{ secrets.AN_API_KEY }}
        run: node --input-type=module < scripts/fetch-signatures.js

      - name: Commitnout změny (pokud existují)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/signatures.json
          git diff --staged --quiet || git commit -m "Aktualizovat počet podpisů"
          git push
